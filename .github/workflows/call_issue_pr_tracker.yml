name: Issue/PR Tracker

on:
  issues:
    types: [opened, reopened, labeled]
  pull_request_target:
    types: [opened, reopened, labeled, synchronize]

jobs:
  issue-pr-tracker:
    if: ${{ !contains(github.actor, 'dependabot') }}
    uses: linuxserver/github-workflows/.github/workflows/issue-pr-tracker.yml@main
    permissions:
      contents: read
      issues: write
      pull-requests: write
    secrets: inherit